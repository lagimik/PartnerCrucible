---
layout: null
excluded_in_search: true
---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Search | Partner Crucible</title>

  <!-- Favicon -->
  <link rel="apple-touch-icon" sizes="180x180" href="/PartnerCrucible/Library/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/PartnerCrucible/Library/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/PartnerCrucible/Library/favicon-16x16.png">
  <link rel="manifest" href="/PartnerCrucible/Library/site.webmanifest">

  <!-- Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-RYZGVB8WWM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-RYZGVB8WWM');
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Navbar -->
  <header class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="./" class="navbar-brand">Microsoft Partner Crucible</a>
      <nav class="navbar-menu" id="navbarMenu" role="navigation" aria-label="Main navigation">
        <a href="./">Home</a>
        <a href="/PartnerCrucible/feed.xml" target="_blank" class="nav-rss" aria-label="RSS Feed">RSS</a>
      </nav>
      <button class="navbar-toggle" id="navbarToggle" aria-label="Toggle navigation" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>
  <div class="mobile-overlay" id="mobileOverlay"></div>

  <main>

    <!-- Hero -->
    <section class="hero hero-short">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <h1 class="hero-title">Search the Crucible</h1>
        <p class="hero-subtitle">Full text search powered by Lunr</p>
        <div class="hero-actions">
          <a href="./" class="btn btn-secondary">← Back to Crucible</a>
        </div>
      </div>
    </section>

    <!-- Search -->
    <section class="section" id="search">
      <div class="container">
        <form class="search-form" action="" method="get">
          <input type="search" name="q" id="search-input" class="search-input" placeholder="🔍 Search the Crucible..." autofocus>
        </form>
        <p class="search-status">
          <span id="search-process">Loading</span> results
          <span id="search-query-container" style="display: none;">
            for "<strong id="search-query"></strong>"
          </span>
        </p>
        <ul id="search-results" class="search-results"></ul>
      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner">
      <p class="footer-text">&copy; 2026 Microsoft Partner Crucible</p>
      <ul class="footer-links">
        <li><a href="https://github.com/lagimik/PartnerCrucible" target="_blank" rel="noopener">GitHub</a></li>
        <li><a href="/PartnerCrucible/feed.xml" target="_blank" rel="noopener">RSS Feed</a></li>
      </ul>
    </div>
  </footer>

  <!-- Search Data -->
  <script>
    window.data = {
      {% for post in site.docs %}
        {% unless post.excluded_in_search %}
          {% if added %},{% endif %}
          {% assign added = false %}
          "{{ post.url | slugify }}": {
            "id": "{{ post.url | slugify }}",
            "title": "{{ post.title | xml_escape }}",
            "categories": "{{ post.categories | join: ", " | xml_escape }}",
            "url": " {{ post.url | xml_escape }}",
            "content": {{ post.content | strip_html | replace_regex: "[\s/\n]+"," " | strip | jsonify }}
          }
          {% assign added = true %}
        {% endunless %}
      {% endfor %}
      {% for post in site.posts %}
        {% unless post.excluded_in_search %}
          {% if added %},{% endif %}
          {% assign added = false %}
          "{{ post.url | slugify }}": {
            "id": "{{ post.url | slugify }}",
            "title": "{{ post.title | xml_escape }}",
            "categories": "{{ post.categories | join: ", " | xml_escape }}",
            "url": " {{ post.url | xml_escape }}",
            "content": {{ post.content | strip_html | replace_regex: "[\s/\n]+"," " | strip | jsonify }}
          }
          {% assign added = true %}
        {% endunless %}
      {% endfor %}
      {% for post in site.pages %}
        {% unless post.excluded_in_search %}
          {% if added %},{% endif %}
          {% assign added = false %}
          "{{ post.url | slugify }}": {
            "id": "{{ post.url | slugify }}",
            "title": "{{ post.title | xml_escape }}",
            "categories": "{{ post.categories | join: ", " | xml_escape }}",
            "url": " {{ post.url | xml_escape }}",
            "content": {{ post.content | strip_html | replace_regex: "[\s/\n]+"," " | strip | jsonify }}
          }
          {% assign added = true %}
        {% endunless %}
      {% endfor %}
    };
  </script>
  <script src="{{ site.baseurl }}/assets/js/lunr.min.js"></script>
  <script src="{{ site.baseurl }}/assets/js/search.js"></script>

  <!-- UI Scripts -->
  <script>
    // Mobile menu toggle
    const toggle = document.getElementById('navbarToggle');
    const menu = document.getElementById('navbarMenu');
    const overlay = document.getElementById('mobileOverlay');

    function closeMenu() {
      menu.classList.remove('active');
      toggle.classList.remove('active');
      overlay.classList.remove('active');
      toggle.setAttribute('aria-expanded', 'false');
      document.body.style.overflow = '';
    }

    toggle.addEventListener('click', function() {
      var isOpen = menu.classList.toggle('active');
      toggle.classList.toggle('active');
      overlay.classList.toggle('active');
      toggle.setAttribute('aria-expanded', isOpen);
      document.body.style.overflow = isOpen ? 'hidden' : '';
    });

    overlay.addEventListener('click', closeMenu);

    menu.querySelectorAll('a').forEach(function(link) {
      link.addEventListener('click', closeMenu);
    });

    // Navbar scroll effect
    var navbar = document.getElementById('navbar');
    window.addEventListener('scroll', function() {
      navbar.classList.toggle('scrolled', window.scrollY > 50);
    }, { passive: true });
  </script>

</body>
</html>
